<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../css/cadastro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <a href="./index.html">
            <img class="logo" src="../img/header-logo.webp" alt="Voila">
        </a>
        <div class="login-link">
            <span>Já possui uma conta?</span>
            <a href="#" id="open-login">Entrar</a>
        </div>
    </header>
    <main class="cadastro">
        <h1>Crie sua conta</h1>
        <p class="subtitle">
            Viaje com ofertas exclusivas e acompanhe todas as suas reservas.
        </p>
        <form>
            <div class="dupla">
                <div class="campo">
                    <label>Nome</label>
                    <input type="text">
                </div>

                <div class="campo">
                    <label>Sobrenome</label>
                    <input type="text">
                </div>
            </div>
            <div class="dupla">
                <div class="campo">
                    <label>CPF</label>
                    <input type="text" id="cpf">
                </div>
                <div class="campo">
                    <label>Data de nascimento</label>
                    <input type="text" id="nascimento" placeholder="DD/MM/AAAA" maxlength="10">
                </div>
            </div>
            <div class="campo">
                <label>E-mail</label>
                <input type="email" id="email">
            </div>
            <div class="campo">
                <label>Telefone</label>
                <input type="text" id="telefone">
            </div>
            <div class="dupla">
                <div class="campo">
                    <label>CEP</label>
                    <input type="text" id="cep">
                </div>
                <div class="campo">
                    <label>Número</label>
                    <input type="text" id="numero">
                </div>
            </div>
            <div class="campo">
                <label>Complemento (Opcional)</label>
                <input type="text">
            </div>
            <div class="campo">
                <label>Senha</label>
                <div class="password-container">
                    <input type="password" id="password">
                    <img src="../img/eye.svg" class="eye-icon" alt="Mostrar senha">
                </div>
            </div>
            <div class="campo">
                <label>Confirmar senha</label>
                <div class="password-container">
                    <input type="password" id="confirm-password">
                    <img src="../img/eye.svg" class="eye-icon" alt="Mostrar senha">
                </div>
            </div>
            <label class="checkbox">
                <input type="checkbox" id="termos">
                Concordo com os Termos de Uso e Política de Privacidade
            </label>
            <button class="criar-conta">
                Criar conta
            </button>
            <div class="separator">
                <span>ou</span>
            </div>
            <button type="button" class="google">
                <img src="../img/google-icon.svg">
                Continuar com Google
            </button>
        </form>
    </main>
    <div class="login-modal">
        <div class="login-modal-box">
            <button class="login-close">
                ✕
            </button>
            <h2 class="login-modal-title">
                Entrar
            </h2>
            <p class="login-modal-subtitle">
                Continue para acessar sua conta.
            </p>
            <input type="email" class="login-input" placeholder="E-mail" id="login-email">
            <div class="password-container">
                <input id="login-password" type="password" class="login-input" placeholder="Senha">
                        <img src="../img/eye.svg" class="eye-icon" alt="Mostrar senha">
            </div>
            <a href="#" class="forgot-password">
                Esqueceu sua senha?
            </a>
            <button class="login-button">
                Entrar
            </button>
        </div>
    </div>
    <div class="forgot-modal">
        <div class="login-modal-box">
            <button class="forgot-close login-close">
                ✕
            </button>
            <h2 class="login-modal-title">
                Recuperar senha
            </h2>
            <p class="login-modal-subtitle">
                Digite seu e-mail para receber as instruções de redefinição.
            </p>
            <input type="email" class="login-input" placeholder="E-mail">
            <button class="login-button">
                Enviar link
            </button>
        </div>
    </div>
    <script src="../js/cadastro.js"></script>
</body>
</html>
